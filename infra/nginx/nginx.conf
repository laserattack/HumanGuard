# infra/nginx/nginx.conf

events {}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    client_max_body_size 25m;

    upstream backend {
        server backend:8080;
    }

    server {
        listen 80;
        server_name _;

        # frontend
	#root /usr/share/nginx/html;
	#index index.html;

	#location / {
	#    try_files $uri $uri/ /index.html;
	#}

        # proxying to backend
        location / {
            proxy_pass         http://backend/;
        }
    }
}
