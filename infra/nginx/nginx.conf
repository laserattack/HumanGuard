# infra/nginx/nginx.conf

events {}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    client_max_body_size 25m;

    upstream backend {
        server backend:8080;
    }

    upstream frontend {
        server frontend:80;
    }

    server {
        listen 80;
        server_name _;

	location /api/ {
	    proxy_pass   http://backend/api/;
	}

	location / { 
	    proxy_pass   http://frontend/; 
	}
    }
}
