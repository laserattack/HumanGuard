version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: humanguard-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: humanguard
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ../backend/migrations:/docker-entrypoint-initdb.d
    networks:
      - backend_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d humanguard"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    #image: backend-image:latest
    build: ../backend
    container_name: humanguard-backend
    networks:
      - backend_network
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ../frontend
    networks:
      - backend_network

  nginx:  
    image: nginx:alpine  
    ports:
      - "80:80"  
      #- "443:443"  
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - backend_network
    depends_on:  
      - backend  
      - frontend

volumes:
  pg_data:

networks:
  backend_network:
    driver: bridge
