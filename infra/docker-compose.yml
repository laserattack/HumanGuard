version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: humanguard-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: humanguard
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ../backend/migrations:/docker-entrypoint-initdb.d
    networks:
      - backend_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d humanguard"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    image: backend-image:latest
    container_name: humanguard-backend
    environment:
      TEST: 0
    networks:
      - backend_network
    depends_on:
      postgres:
        condition: service_healthy

  #frontend:

  nginx:  
    image: nginx:alpine  
    ports:  
      - "80:80"  
      #- "443:443"  
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro  
      #- frontend_build:/usr/share/nginx/html:ro  
    networks:
      - backend_network
    depends_on:  
      - backend  
      #- frontend

volumes:
  pg_data:
  #frontend_build:

networks:
  backend_network:
    driver: bridge
